<!doctype html>
<html lang="he" dir="ltr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>שגיאת מערכת - Braude Top</title>
		<style>
			body {
				font-family: monospace;
				font-size: 17px;
				background-color: #000;
				color: #00ff00;
				margin: 0;
				padding: 20px;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				overflow: hidden;
			}
			#terminal {
				width: 80%;
				max-width: 800px;
				background-color: #111;
				padding: 20px;
				border-radius: 5px;
				box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
				overflow: hidden;
			}
			.text {
				word-wrap: break-word;
				line-height: 1.5;
				text-align: left;
			}
			ul {
				list-style: none;
			}
			li {
				display: inline;
			}
			.cursor {
				display: inline-block;
				width: 10px;
				height: 20px;
				background-color: #00ff00;
				vertical-align: middle;
			}
			.animation {
				animation: blink 1.5s steps(2, jump-none) infinite;
			}
			@keyframes blink {
				from {
					opacity: 1;
				}
				to {
					opacity: 0;
				}
			}
			a {
				color: #00ff00;
				text-decoration: underline;
			}
			a:hover {
				text-decoration: none;
			}
			#copy-button {
				margin-top: 20px;
				padding: 10px 20px;
				background-color: transparent;
				color: #00ff00;
				border: none;
				border-radius: 3px;
				font-family: monospace;
				font-size: 14px;
				font-weight: bold;
				cursor: pointer;
				opacity: 0;
				transition: all 0.2s ease;
			}
			#copy-button:hover {
				box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
			}
			#copy-button:active {
				background-color: #00aa00;
			}
			#copy-notification {
				display: none;
				color: #00ff00;
				font-weight: bold;
				margin-top: 10px;
				animation: fadeInOut 2s ease-in-out;
			}
			@keyframes fadeInOut {
				0%,
				100% {
					opacity: 0;
				}
				50% {
					opacity: 1;
				}
			}
		</style>
	</head>
	<body>
		<div id="terminal">
			<ul class="text">
				<span class="cursor"></span>
			</ul>
			<button id="copy-button">📋 Copy Debug Info</button>
			<div id="copy-notification">✓ Debug info copied to clipboard</div>
		</div>
	</body>
	<script>
		function copyDebugInfoToClipboard() {
			const debugInfo = {
				'Screen Size': `${window.screen.width}x${window.screen.height}`,
				'Viewport Size': `${window.innerWidth}x${window.innerHeight}`,
				'User Agent': navigator.userAgent,
				Timestamp: new Date().toISOString(),
				URL: window.location.href,
				Referrer: document.referrer || 'none',
				'Local Storage': JSON.stringify(localStorage),
			};

			navigator.clipboard
				.writeText(JSON.stringify(debugInfo))
				.then(() => {
					const notification = document.getElementById('copy-notification');
					notification.style.display = 'block';
					setTimeout(() => {
						notification.style.display = 'none';
					}, 2000);
				})
				.catch(() => {
					alert('Failed to copy to clipboard');
				});
		}

		// Show button after animation completes
		function showCopyButton() {
			const copyButton = document.getElementById('copy-button');
			copyButton.style.opacity = 1;
			copyButton.addEventListener('click', copyDebugInfoToClipboard);
		}

		const list = document.getElementsByClassName('text')[0];
		const cursor = document.getElementsByClassName('cursor')[0];

		const messageSpeed = 1000;
		const messages = [
			'<b>SYSTEM ERROR</b>',
			'ERROR CODE: %sveltekit.status%',
			'ERROR MESSAGE: %sveltekit.error.message%',
			'system utterly broken',
			'system state unrecoverable',
			'fetching admin message',
			'. . . . .',
			'admin message recovered',
			'===ADMIN MESSAGE START===',
			'<span dir="rtl">נראה ששברת לי את השרת, זה לא נורא יפה...</span>',
			'<span dir="rtl">בתור סליחה, אשמח אם תוכל לשלוח לי מייל איך זה קרה, אני אשמח לתקן את הבעיה</span>',
			'<span dir="rtl">הכל אמור לעבוד שוב אחרי רענון של הדף, מצטער על התקלה😅</span>',
			'<span dir="rtl">זה המייל שלי: <a href="mailto:nhajeho1@gmail.com">nhajeho1@gmail.com</a></span>',
			'<span dir="rtl">אשמח שתשלח לי לפה את כל הפרטים, שהובילו לתקלה, מה עשית קודם, האם זו פעם ראשונה וכו\', בנוסף, יש כפתור קטן כדי להעתיק מספר פרטים שיעזרו לי לדבג את הבעיה, תודה!</span>',
			'<span dir="rtl">אתה יכול לנסות לרענן את הדף עכשיו, אם אתה מגיע עדיין לדף הזה, בהחלט כדאי שתשלח לי מייל...</span>',
			'===ADMIN MESSAGE END===',
		].reverse();
		(async () => {
			while (messages.length > 0) {
				let res;
				const promise = new Promise((resolve) => {
					res = resolve;
				});
				const li = document.createElement('li');
				list.removeChild(cursor);
				list.append(li);
				list.append(cursor);
				const letters = messages.pop().split('');
				let index = 0;
				const interval = messageSpeed / letters.length;
				const id = setInterval(() => {
					if (letters.length === index) {
						res();
						return;
					}
					index++;
					li.innerHTML = letters.slice(0, index).join('');
				}, interval);
				await promise;
				clearInterval(id);
				const br = document.createElement('br');
				list.append(br);
			}
			cursor.classList.add('animation');
			// Show the copy button after animation completes
			showCopyButton();
		})();
	</script>
</html>
